<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doux — Todo</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #ffffff;
      --border: #e2ddd4;
      --text: #1a1714;
      --muted: #9a948a;
      --accent: #c84b31;
      --accent-light: rgba(200,75,49,0.08);
      --done: #9a948a;
      --shadow: 0 2px 16px rgba(26,23,20,0.08);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--accent);
    }

    .container {
      width: 100%;
      max-width: 540px;
    }

    header {
      margin-bottom: 2.5rem;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 3rem;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.3rem;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    /* Input area */
    .input-wrap {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1.1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
    }

    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .add-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.9rem 1.3rem;
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: var(--shadow);
      line-height: 1;
    }

    .add-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .add-btn:active { transform: translateY(0); }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
    }

    .filter-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Todo list */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .todo-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      box-shadow: var(--shadow);
      animation: slideIn 0.25s ease forwards;
      transition: opacity 0.2s, transform 0.2s;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item.removing {
      opacity: 0;
      transform: translateX(20px);
    }

    /* Custom checkbox */
    .check-wrap {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .check-wrap:hover { border-color: var(--accent); }
    .check-wrap.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-wrap.checked::after {
      content: '✓';
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .todo-text {
      flex: 1;
      font-size: 0.92rem;
      line-height: 1.4;
      transition: color 0.2s;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--done);
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--border);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem;
      line-height: 1;
      transition: color 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: var(--accent); transform: scale(1.2); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
      display: none;
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }

    /* Footer stats */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.2rem;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0 0.2rem;
    }

    .clear-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.2s;
      text-decoration: underline;
    }

    .clear-btn:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Do<span>u</span>x</div>
      <div class="subtitle">A calm place for your tasks</div>
    </header>

    <div class="input-wrap">
      <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off"/>
      <button class="add-btn" id="addBtn">+</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <div class="todo-list" id="todoList"></div>
    <div class="empty" id="empty">
      <div class="empty-icon">✦</div>
      <div>Nothing here yet.<br/>Add a task above.</div>
    </div>

    <div class="stats-bar">
      <span id="statsText">0 tasks remaining</span>
      <button class="clear-btn" id="clearBtn">Clear completed</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('doux-todos') || '[]');
    let currentFilter = 'all';

    const input = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('todoList');
    const empty = document.getElementById('empty');
    const statsText = document.getElementById('statsText');
    const clearBtn = document.getElementById('clearBtn');

    function save() {
      localStorage.setItem('doux-todos', JSON.stringify(todos));
    }

    function getFiltered() {
      if (currentFilter === 'active') return todos.filter(t => !t.done);
      if (currentFilter === 'completed') return todos.filter(t => t.done);
      return todos;
    }

    function render() {
      const filtered = getFiltered();
      list.innerHTML = '';

      if (filtered.length === 0) {
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        filtered.forEach(todo => {
          const item = document.createElement('div');
          item.className = 'todo-item' + (todo.done ? ' done' : '');
          item.dataset.id = todo.id;

          const check = document.createElement('div');
          check.className = 'check-wrap' + (todo.done ? ' checked' : '');
          check.addEventListener('click', () => toggle(todo.id));

          const text = document.createElement('div');
          text.className = 'todo-text';
          text.textContent = todo.text;

          const del = document.createElement('button');
          del.className = 'delete-btn';
          del.innerHTML = '×';
          del.addEventListener('click', () => remove(todo.id));

          item.appendChild(check);
          item.appendChild(text);
          item.appendChild(del);
          list.appendChild(item);
        });
      }

      const remaining = todos.filter(t => !t.done).length;
      statsText.textContent = `${remaining} task${remaining !== 1 ? 's' : ''} remaining`;
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggle(id) {
      todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      render();
    }

    function remove(id) {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) {
        el.classList.add('removing');
        setTimeout(() => {
          todos = todos.filter(t => t.id !== id);
          save();
          render();
        }, 200);
      }
    }

    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    clearBtn.addEventListener('click', () => {
      todos = todos.filter(t => !t.done);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
